<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misty Archive | Gemini Edition</title>
    <style>
        :root {
            --blush: #f8bbd0;
            --cream: #fffdf0;
            --text-soft: #5d4037;
            --glass: rgba(255, 255, 255, 0.8);
            --accent: #e0d5c1;
            --sidebar-w: 280px;
        }

        /* RESET & BODY */
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: var(--cream); color: var(--text-soft); height: 100%; overflow: hidden; }
        .view { display: none; width: 100vw; height: 100vh; position: relative; flex-direction: column; }
        .active { display: flex !important; }

        /* SIDEBAR (Gemini Style) */
        #sidebar {
            position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%;
            background: white; z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 30px 20px; box-sizing: border-box;
        }
        #sidebar.open { left: 0; }
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.4); z-index: 1500; display: none; backdrop-filter: blur(2px);
        }
        .menu-item { padding: 15px; margin: 5px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .menu-item:hover { background: var(--cream); color: var(--blush); }

        /* HEADER & NAVIGATION */
        .header { display: flex; align-items: center; background: white; border-bottom: 1px solid var(--accent); padding: 0 15px; min-height: 60px; z-index: 100; }
        .hamburger { cursor: pointer; font-size: 24px; padding: 10px; margin-right: 10px; }

        /* LOADER */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; 
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .loader-gif { width: 45vw; max-width: 250px; }

        /* CHARACTER VIEWER STAGE */
        .stage { flex-grow: 1; position: relative; background: #fcfcfc; overflow: hidden; display: flex; flex-direction: column; }
        .char-box { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }
        .main-char { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 85%; transition: 0.6s ease; pointer-events: none; }

        /* BOTTOM INFO SHEET (The Fix) */
        .bottom-sheet {
            background: white; border-radius: 24px 24px 0 0; padding: 25px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); z-index: 100;
            max-height: 40%; overflow-y: auto; border-top: 5px solid var(--blush);
            transform: translateY(0); transition: 0.4s;
        }

        /* WELCOME */
        #welcome { justify-content: center; align-items: center; text-align: center; }
        .welcome-bg { position: absolute; width: 100%; height: 100%; background: url('https://w.wallhaven.cc/full/ox/wallhaven-ox6589.jpg') center/cover; filter: blur(5px) brightness(0.7); }
        .glass-card { position: relative; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; color: white; }
        
        /* BENTO GRID */
        .grid-wrapper { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .bento-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; width: 100%; max-width: 900px; 
        }
        .bento-item { 
            height: 180px; background: #ddd center/cover; border-radius: 15px; 
            display: flex; align-items: flex-end; overflow: hidden; transition: 0.3s;
            border: 1px solid var(--accent);
        }
        .bento-item b { width: 100%; background: rgba(255,255,255,0.85); padding: 12px; text-align: center; font-size: 13px; }

        .btn-primary { background: white; border: none; padding: 12px 35px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeMenu()"></div>
    <div id="sidebar">
        <h2 style="letter-spacing: 2px;">MISTY MENU</h2>
        <div class="menu-item" onclick="nav('welcome'); closeMenu()">🏠 Home</div>
        <div class="menu-item" onclick="nav('race-select'); closeMenu()">👤 Race Database</div>
        <div class="menu-item" style="opacity: 0.5;">📖 Archive Log (Soon)</div>
        <div class="menu-item" style="opacity: 0.5;">⚙️ Settings</div>
    </div>

    <div id="loader">
        <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/ui/shigure-ui-transparent.gif" class="loader-gif">
    </div>

    <div id="main-content" style="visibility: hidden;">
        
        <div id="welcome" class="view active">
            <div class="welcome-bg"></div>
            <div class="glass-card">
                <h1 style="letter-spacing: 8px; margin: 0;">MISTY ARCHIVE</h1>
                <button class="btn-primary" onclick="nav('race-select')">ENTER ARCHIVE</button>
            </div>
        </div>

        <div id="race-select" class="view">
            <div class="header">
                <div class="hamburger" onclick="openMenu()">☰</div>
                <h3 style="margin: 0; font-weight: 500;">Select Race</h3>
            </div>
            <div class="grid-wrapper">
                <div class="bento-grid">
                    <div class="bento-item" onclick="selectRace('human')"><b>HUMAN</b></div>
                    <div class="bento-item" onclick="selectRace('elf')"><b>ELF</b></div>
                    <div class="bento-item" onclick="selectRace('beastmen')"><b>BEASTMEN</b></div>
                    <div class="bento-item" onclick="selectRace('vampire')"><b>VAMPIRE</b></div>
                </div>
            </div>
        </div>

        <div id="viewer" class="view">
            <div class="header">
                <div class="hamburger" onclick="window.history.back()">←</div>
                <div id="icon-bar" style="display: flex; overflow-x: auto; flex-grow: 1; padding: 5px;"></div>
            </div>
            <div class="stage">
                <div class="char-box">
                    <img id="char-img" src="" class="main-char">
                </div>
                <div class="bottom-sheet" id="info-sheet">
                    <h2 id="char-name" style="margin: 0;">Welcome</h2>
                    <p id="char-cv" style="font-size: 11px; color: var(--blush); margin: 5px 0; font-weight: bold;"></p>
                    <div id="char-desc" style="font-size: 14px; line-height: 1.6; color: #555;">Tap a character icon above to load their profile.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRace = "";

        // UI HELPERS
        function openMenu() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').style.display = 'block';
        }
        function closeMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        // NAVIGATION ENGINE
        function nav(id, addHistory = true) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(addHistory) history.pushState({ screenId: id }, "", "");
        }

        window.onpopstate = (e) => {
            if(e.state && e.state.screenId) nav(e.state.screenId, false);
            else nav('welcome', false);
        };

        function selectRace(r) {
            selectedRace = r;
            renderIcons();
            nav('viewer');
        }

        // DATABASE
        const chars = [
            {
                race: 'human',
                name: 'Atelier',
                cv: 'Marika Tachibana',
                desc: 'A kind-hearted girl working as the poster girl for a diner in the misty hills of Ghoom. She loves the foggy mornings.',
                main: 'https://tsuihosha-shokudo.com/assets/img/chara/atelier/img_chara_stand02.png',
                icon: 'https://i.postimg.cc/C1z8g7z4/Atelier-Icon1.png'
            }
        ];

        function renderIcons() {
            const bar = document.getElementById('icon-bar');
            bar.innerHTML = "";
            chars.filter(c => c.race === selectedRace).forEach(c => {
                const img = document.createElement('img');
                img.src = c.icon;
                img.style = "width:45px; height:45px; border-radius:50%; margin-right:12px; border:2px solid var(--blush); cursor:pointer;";
                img.onclick = () => {
                    document.getElementById('char-name').innerText = c.name;
                    document.getElementById('char-cv').innerText = "CV: " + c.cv;
                    document.getElementById('char-desc').innerText = c.desc;
                    document.getElementById('char-img').src = c.main;
                };
                bar.appendChild(img);
            });
        }

        // INITIAL LOAD
        window.addEventListener('load', () => {
            history.replaceState({ screenId: 'welcome' }, "", "");
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                document.getElementById('main-content').style.visibility = 'visible';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
            }, 2500);
        });
    </script>
</body>
            </html>
