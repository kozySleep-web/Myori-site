<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Select</title>
    <style>
        body { margin: 0; background: #fdf5e6; font-family: sans-serif; text-align: center; }
        
        /* THE ICON GRID */
        .icon-grid {
            display: flex; justify-content: center; flex-wrap: wrap;
            gap: 10px; padding: 20px; background: #fffdf0; border-bottom: 2px solid #ddd;
        }
        .icon {
            width: 60px; height: 60px; border: 2px solid #ccc; cursor: pointer;
            border-radius: 5px; object-fit: cover; transition: 0.2s;
        }
        .icon:hover { border-color: #ffb6c1; transform: scale(1.1); }

        /* THE DISPLAY AREA */
        .main-display {
            position: relative; width: 100%; height: 600px;
            background-size: cover; background-position: center;
            transition: 0.5s; overflow: hidden;
        }
        .char-img {
            position: absolute; left: 10%; bottom: 0;
            height: 80%; transition: 0.5s;
        }

        /* THE FLOATING BOX */
        .info-box {
            position: absolute; right: 5%; top: 20%;
            width: 250px; padding: 20px; text-align: left;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }
        .info-box h1 { margin: 0; font-size: 28px; }
        .info-box .cv { font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="icon-grid">
        <img src="https://placehold.co/60x60/f8bbd0/white?text=L" class="icon" onclick="changeChar('Lina')">
        <img src="https://placehold.co/60x60/bbdefb/black?text=A" class="icon" onclick="changeChar('Atelier')">
    </div>

    <div id="display" class="main-display" style="background-image: url('https://placehold.co/800x600/e0e0e0/grey?text=Misty+Forest');">
        
        <img id="main-char" src="https://placehold.co/400x600/transparent/transparent?text=Lina+Full" class="char-img">

        <div id="box" class="info-box" style="background: #f8bbd0;">
            <h1 id="name">Lina</h1>
            <p id="cv" class="cv">CV. Voice Actress A</p>
            <p id="desc">A cheerful traveler of the misty hills. She carries a lantern to guide her path.</p>
        </div>
    </div>

    <script>
        // Data for your characters
        const data = {
            'Lina': {
                name: 'Lina',
                cv: 'CV. Voice Actress A',
                desc: 'A cheerful traveler of the misty hills. She carries a lantern to guide her path.',
                color: '#f8bbd0',
                bg: 'https://placehold.co/800x600/e0e0e0/666?text=Misty+Forest',
                img: 'https://placehold.co/400x600/f8bbd0/white?text=Lina+Pose'
            },
            'Atelier': {
                name: 'Atelier',
                cv: 'CV. Marika Tachibana',
                desc: 'A young girl rescued from a difficult past. She is quiet but has a very kind heart.',
                color: '#e1bee7',
                bg: 'https://placehold.co/800x600/d1c4e9/666?text=Town+Street',
                img: 'https://placehold.co/400x600/e1bee7/white?text=Atelier+Pose'
            }
        };

        function changeChar(charName) {
            const char = data[charName];
            
            // Update Text
            document.getElementById('name').innerText = char.name;
            document.getElementById('cv').innerText = char.cv;
            document.getElementById('desc').innerText = char.desc;
            
            // Update Styles
            document.getElementById('box').style.background = char.color;
            document.getElementById('display').style.backgroundImage = `url('${char.bg}')`;
            document.getElementById('main-char').src = char.img;
        }
    </script>

</body>
</html>
