<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Misty Archive - Final Resilient Production Build v14">
    <title>Misty Archive | Vanguard v14</title>
    <style>
        :root {
            --blush: #f8bbd0; --sidebar-w: 280px; --transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --accent: #94a3b8; --header: #0f172a;
            --skeleton: #2d3748;
        }
        body.light-mode {
            --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --accent: #64748b; --header: #ffffff;
            --skeleton: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: background 0.3s; opacity: 0; }
        
        #app { display: grid; height: 100%; grid-template-rows: auto 1fr; position: relative; z-index: 10; transition: filter 0.4s, transform 0.4s; }
        #app.modal-open { filter: blur(12px) grayscale(0.6); transform: scale(0.98); pointer-events: none; }

        .app-header { height: 64px; background: var(--header); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(128,128,128,0.1); z-index: 1000; backdrop-filter: blur(10px); }
        .view { display: none; height: 100%; overflow-y: auto; opacity: 0; transform: translateY(10px); outline: none; }
        .view.active { display: flex; flex-direction: column; opacity: 1; transform: translateY(0); transition: 0.4s ease; }
        
        .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100%; background: var(--surface); z-index: 2000; padding: 30px 24px; box-shadow: 20px 0 60px rgba(0,0,0,0.3); transform: translateX(-100%); transition: transform var(--transition); visibility: hidden; }
        .sidebar.open { transform: translateX(0); visibility: visible; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; display: none; backdrop-filter: blur(4px); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .card { aspect-ratio: 1/1.2; overflow: hidden; position: relative; transition: transform 0.2s; background: var(--skeleton); border-radius: 20px; cursor: pointer; border: none; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.4s; }
        .card img.loaded { opacity: 1; }
        .card-label { position: absolute; bottom: 0; width: 100%; padding: 10px; background: rgba(0,0,0,0.8); color: #fff; text-align: center; font-weight: 700; font-size: 0.75rem; letter-spacing: 1px; }

        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; }
        #char-portrait { max-height: 85%; width: auto; opacity: 0; transform: translateY(20px); transition: 0.5s var(--transition); }
        #char-portrait.active { opacity: 1; transform: translateY(0); }
        .sheet { background: var(--surface); border-radius: 30px 30px 0 0; padding: 30px; border-top: 4px solid var(--blush); box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }

        .loader-ui { display: none; align-items: center; justify-content: center; height: 100px; color: var(--accent); font-weight: bold; letter-spacing: 2px; }
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; outline-offset: 4px; }
        
        .skeleton { position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    </style>
</head>
<body>
    <canvas id="fog-canvas"></canvas>
    <div id="sidebar-overlay" class="overlay"></div>
    
    <nav class="sidebar" id="sidebar" role="dialog" aria-modal="true" aria-label="Archive Menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color: var(--blush); letter-spacing: 2px;">ARCHIVE</h2>
            <button id="close-sidebar" aria-label="Close Menu" style="font-size:24px;">✕</button>
        </div>
        <button id="theme-btn" style="width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 12px; margin-bottom: 20px;">🌓 Toggle Theme</button>
        <button class="nav-btn" data-target="welcome" style="display:block; width:100%; text-align:left; padding:15px 0; border-bottom:1px solid rgba(128,128,128,0.1);">🏠 Home</button>
        <button class="nav-btn" data-target="race-select" style="display:block; width:100%; text-align:left; padding:15px 0;">👤 Database</button>
    </nav>

    <div id="app">
        <header class="app-header">
            <button id="menu-btn" aria-label="Open Menu" style="font-size: 24px;">☰</button>
            <h1 id="header-title" style="flex:1; text-align:center; font-size:0.8rem; letter-spacing:2px; font-weight: 800;">MISTY ARCHIVE</h1>
            <div style="width: 24px;"></div>
        </header>

        <main id="main-content" role="main" aria-live="polite">
            <section id="welcome" class="view active" tabindex="-1">
                <div style="position:absolute; inset:0; background:url('https://w.wallhaven.cc/full/ox/wallhaven-ox6589.jpg') center/cover; filter:brightness(0.3);"></div>
                <div style="margin:auto; z-index:10; text-align:center; padding:40px; background:rgba(0,0,0,0.4); border-radius:32px; backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); width:90%; max-width:400px;">
                    <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/welcome_box.gif" style="width:100%; mix-blend-mode:screen;" alt="">
                    <button class="nav-btn" data-target="race-select" style="width:100%; margin-top:20px; padding:18px; border-radius:50px; background:#fff; color:#000; font-weight:800;">INITIALIZE</button>
                </div>
            </section>
            <section id="race-select" class="view" tabindex="-1"><div class="grid" id="race-grid"></div></section>
            <section id="viewer" class="view" tabindex="-1">
                <div id="viewer-status" class="loader-ui" role="status">DECRYPTING ARCHIVE...</div>
                <div class="stage"><img id="char-portrait" src="" alt=""></div>
                <div class="sheet"><h2 id="char-name" style="color:var(--blush);"></h2><p id="char-desc" style="margin-top:10px; line-height:1.6;"></p></div>
            </section>
        </main>
    </div>

    <script>
        "use strict";

        /** * STATE: REACTIVE PERSISTENT ENGINE
         */
        class Store {
            constructor(initial) {
                this.subs = {};
                this.state = new Proxy(initial, {
                    set: (obj, prop, val) => {
                        if (obj[prop] === val) return true;
                        obj[prop] = val;
                        queueMicrotask(() => {
                            this.subs[prop]?.forEach(fn => { try { fn(val); } catch (e) { console.error(e); }});
                        });
                        return true;
                    }
                });
            }
            subscribe(prop, fn) {
                if (!this.subs[prop]) this.subs[prop] = [];
                this.subs[prop].push(fn);
                return () => this.subs[prop] = this.subs[prop].filter(f => f !== fn);
            }
        }

        const GStore = new Store({ 
            view: 'welcome', 
            sidebar: false, 
            theme: localStorage.getItem('misty-theme') || 'night' 
        });

        const Registry = {
            races: [
                { id: 'human', label: 'HUMAN', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/human-girl.png' },
                { id: 'elf', label: 'ELF', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/elf-girl-box-image.jpg' }
            ],
            async getCharacter(id) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const data = { 'human': { name: 'Atelier', desc: 'Botanical Alchemist of Ghoom Pahar Forest.', portrait: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/atelier-human-girl/atelier-human-girl-main.png' }};
                        resolve(data[id] || null);
                    }, 600);
                });
            }
        };

        const App = {
            previousFocus: null,
            boot() {
                this.bindStore();
                this.initUI();
                this.initRouter();
                Fog.start();
                document.body.style.opacity = '1';
            },

            bindStore() {
                GStore.subscribe('sidebar', (open) => {
                    const sb = document.getElementById('sidebar'), app = document.getElementById('app');
                    sb.classList.toggle('open', open);
                    app.classList.toggle('modal-open', open);
                    document.getElementById('sidebar-overlay').style.display = open ? 'block' : 'none';
                    
                    if (open) {
                        this.previousFocus = document.activeElement;
                        this.trapFocus(sb);
                    } else if (this.previousFocus) {
                        this.previousFocus.focus();
                    }
                    
                    if ('inert' in app) app.inert = open;
                    else app.setAttribute('aria-hidden', open);
                });

                GStore.subscribe('view', (id) => {
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    const target = document.getElementById(id);
                    if (target) { target.classList.add('active'); target.focus(); }
                    document.getElementById('header-title').textContent = id.toUpperCase();
                });

                GStore.subscribe('theme', (t) => {
                    document.body.classList.toggle('light-mode', t === 'light');
                    localStorage.setItem('misty-theme', t);
                });
            },

            initUI() {
                const grid = document.getElementById('race-grid');
                Registry.races.forEach(r => {
                    const card = document.createElement('button');
                    card.className = 'card skeleton';
                    card.innerHTML = `<img src="${r.img}" alt=""><div class="card-label">${r.label}</div>`;
                    const img = card.querySelector('img');
                    img.addEventListener('load', () => { card.classList.remove('skeleton'); img.classList.add('loaded'); }, {once: true});
                    card.onclick = () => this.loadRace(r.id);
                    grid.appendChild(card);
                });

                document.getElementById('menu-btn').onclick = () => GStore.state.sidebar = true;
                document.getElementById('close-sidebar').onclick = () => GStore.state.sidebar = false;
                document.getElementById('sidebar-overlay').onclick = () => GStore.state.sidebar = false;
                document.getElementById('theme-btn').onclick = () => GStore.state.theme = GStore.state.theme === 'night' ? 'light' : 'night';
                
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.onclick = (e) => this.navigate(e.currentTarget.dataset.target);
                });

                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && GStore.state.sidebar) GStore.state.sidebar = false;
                });

                window.addEventListener('resize', () => Fog.resize());
            },

            trapFocus(el) {
                const focusable = el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                const first = focusable[0], last = focusable[focusable.length - 1];
                el.onkeydown = (e) => {
                    if (e.key !== 'Tab') return;
                    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
                    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
                };
                first.focus();
            },

            navigate(target) {
                if (GStore.state.view !== target) {
                    GStore.state.view = target;
                    history.pushState({view: target}, "", `#${target}`);
                    GStore.state.sidebar = false;
                }
            },

            initRouter() {
                const hash = window.location.hash.replace('#', '');
                if (hash && document.getElementById(hash)) GStore.state.view = hash;
                window.onpopstate = (e) => GStore.state.view = e.state?.view || 'welcome';
            },

            async loadRace(id) {
                const status = document.getElementById('viewer-status');
                const portrait = document.getElementById('char-portrait');
                status.style.display = 'flex';
                portrait.classList.remove('active');
                
                this.navigate('viewer');
                const data = await Registry.getCharacter(id);
                
                if (!data) { status.textContent = "ENTRY ENCRYPTED"; return; }
                
                const tempImg = new Image();
                tempImg.src = data.portrait;
                await tempImg.decode().catch(() => {});
                
                status.style.display = 'none';
                document.getElementById('char-name').textContent = data.name;
                document.getElementById('char-desc').textContent = data.desc;
                portrait.src = data.portrait;
                portrait.classList.add('active');
            }
        };

        const Fog = {
            cvs: document.getElementById('fog-canvas'), ctx: null, rafId: null, pts: [], lastTime: 0, active: true,
            start() {
                this.ctx = this.cvs.getContext('2d');
                this.resize();
                this.pts = Array.from({length: 30}, () => ({ x: Math.random(), y: Math.random(), v: 0.0005 + Math.random() * 0.001 }));
                document.addEventListener('visibilitychange', () => { this.active = !document.hidden; if(this.active) this.loop(performance.now()); });
                if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) this.loop(performance.now());
            },
            resize() {
                const dpr = window.devicePixelRatio || 1;
                this.cvs.width = window.innerWidth * dpr;
                this.cvs.height = window.innerHeight * dpr;
                this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            },
            loop(time) {
                if (!this.active) { cancelAnimationFrame(this.rafId); return; }
                this.rafId = requestAnimationFrame((t) => this.loop(t));
                
                if (time - this.lastTime < 30) return;
                this.lastTime = time;
                
                this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                this.ctx.fillStyle = GStore.state.theme === 'night' ? '#ffffff08' : '#00000005';
                this.pts.forEach(p => {
                    p.y += p.v; if (p.y > 1.1) p.y = -0.1;
                    this.ctx.fillRect(p.x * window.innerWidth, p.y * window.innerHeight, 2, 20);
                });
            }
        };

        App.boot();
    </script>
</body>
</html>
