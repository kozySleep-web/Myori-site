<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Character Profile</title>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .character-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background-color: #ffd1dc;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; color: #4a4a4a; }
        p { color: #777; line-height: 1.5; }

        .btn-skill {
            background-color: #d18abf;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* BIGGER Skill Display Area */
        #skill-display {
            display: none; 
            width: 100%;
            max-width: 380px; /* Made this slightly wider */
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
            animation: fadeIn 0.4s;
            margin-bottom: 30px;
        }

        .skill-img {
            width: 100%;
            height: 250px; /* Made the image taller/bigger */
            object-fit: cover;
            border-radius: 12px;
            margin-top: 10px;
            background-color: #e0f2f1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://placehold.co/350x320/f8bbd0/white?text=Lina+Image" class="character-image">
        <div class="content">
            <h1>Lina</h1>
            <p>An 8-year-old traveler of the misty hills. She carries a lantern that guides her through the thickest fog.</p>
            <button class="btn-skill" id="skill-btn" onclick="toggleSkills()">Show Magic Skill</button>
        </div>
    </div>

    <div id="skill-display">
        <h2 style="color: #d18abf; margin-top: 0;">Skill: Mist Bloom</h2>
        <p style="font-size: 14px;">Lina uses her lantern to illuminate the path and make magic flowers grow in the cold mist.</p>
        <img src="https://placehold.co/400x300/a5d6a7/white?text=BIG+Magic+Effect+Image" class="skill-img">
    </div>

    <script>
        function toggleSkills() {
            var skillSection = document.getElementById('skill-display');
            var btn = document.getElementById('skill-btn');
            
            // Check if it is currently hidden
            if (skillSection.style.display === "none" || skillSection.style.display === "") {
                skillSection.style.display = "block"; // Show it
                btn.innerText = "Hide Magic Skill"; // Change button text
                
                // Scroll down to see the big image
                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 100);
                
            } else {
                skillSection.style.display = "none"; // Hide it
                btn.innerText = "Show Magic Skill"; // Change button text back
            }
        }
    </script>

</body>
  </html>
