<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Misty Archive - A professional character database with atmospheric Ghoom aesthetics.">
    <title>Misty Archive | Production v3.0</title>
    
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    
    <style>
        /* Embedded Critical CSS for Performance */
        :root {
            --blush: #f8bbd0; --sidebar-w: 280px; --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --bg: #1a1a2e; --surface: #16213e; --text: #ecf0f1; --accent: #d7ccc8; --header: #0f3460;
        }
        body.light-mode {
            --bg: #f0f2f5; --surface: #ffffff; --text: #3e2723; --accent: #6d4c41; --header: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden; height: 100vh;
        }
        #app { display: grid; height: 100%; grid-template-rows: auto 1fr; }
        .view { display: none; height: 100%; overflow-y: auto; position: relative; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn var(--transition); }
        
        /* Professional Navigation */
        .app-header { 
            height: 64px; background: var(--header); display: flex; align-items: center; 
            padding: 0 16px; border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 1000;
        }
        .btn-icon { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .btn-icon:hover { background: rgba(128,128,128,0.1); }

        /* Bento Grid System */
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .race-card { 
            aspect-ratio: 1/1.2; border-radius: 24px; overflow: hidden; position: relative; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s ease;
        }
        .race-card:hover { transform: translateY(-5px); }
        .race-card img { width: 100%; height: 100%; object-fit: cover; }
        .race-label { position: absolute; bottom: 0; width: 100%; padding: 16px; background: rgba(0,0,0,0.6); color: #fff; text-align: center; font-weight: 600; backdrop-filter: blur(8px); }

        /* Stage & Bottom Sheet */
        .stage { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: flex-end; }
        .char-portrait { max-height: 85%; width: auto; object-fit: contain; z-index: 2; transition: opacity 0.5s; }
        .bottom-sheet { 
            background: var(--surface); border-radius: 32px 32px 0 0; padding: 24px; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2); z-index: 10; border-top: 4px solid var(--blush);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Particle Canvas */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        
        /* Sidebar */
        .sidebar { 
            position: fixed; left: calc(-1 * var(--sidebar-w)); top: 0; width: var(--sidebar-w); height: 100%;
            background: var(--surface); z-index: 2000; transition: var(--transition); padding: 40px 24px;
            box-shadow: 20px 0 60px rgba(0,0,0,0.3);
        }
        .sidebar.open { transform: translateX(var(--sidebar-w)); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="particle-canvas"></canvas>
    <div id="sidebar-overlay" class="overlay"></div>
    
    <nav class="sidebar" id="sidebar">
        <h2 style="color: var(--blush); letter-spacing: 2px;">ARCHIVE</h2>
        <div style="margin-top: 32px;">
            <button class="theme-switch" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--accent); background: none; color: var(--text); cursor: pointer;" onclick="toggleTheme()">🌓 Toggle Theme</button>
        </div>
        <ul style="list-style: none; padding: 0; margin-top: 40px;">
            <li onclick="Router.nav('welcome')" style="padding: 16px 0; border-bottom: 1px solid rgba(128,128,128,0.2); cursor: pointer;">🏠 Home</li>
            <li onclick="Router.nav('race-select')" style="padding: 16px 0; border-bottom: 1px solid rgba(128,128,128,0.2); cursor: pointer;">👤 Database</li>
        </ul>
    </nav>

    <div id="loader" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/ui/shigure-ui-transparent.gif" alt="Loading..." style="width:200px;">
    </div>

    <div id="app">
        <header class="app-header">
            <button class="btn-icon" onclick="toggleSidebar()">☰</button>
            <div id="header-title" style="flex: 1; text-align: center; font-weight: bold; letter-spacing: 1px;">MISTY ARCHIVE</div>
            <div style="width: 40px;"></div>
        </header>

        <main style="position: relative; overflow: hidden;">
            <section id="welcome" class="view active">
                <div style="position: absolute; inset: 0; background: url('https://w.wallhaven.cc/full/ox/wallhaven-ox6589.jpg') center/cover; filter: brightness(0.4);"></div>
                <div style="margin: auto; z-index: 10; text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 32px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px;">
                    <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/welcome_box.gif" style="width: 100%; border-radius: 16px; mix-blend-mode: screen; margin-bottom: 24px;">
                    <h1 style="color: #fff; margin: 0 0 24px 0; letter-spacing: 4px;">MISTY ARCHIVE</h1>
                    <button onclick="Router.nav('race-select')" style="width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background: #fff; color: #000;">INITIALIZE</button>
                </div>
            </section>

            <section id="race-select" class="view">
                <div class="bento-grid" id="race-grid">
                    </div>
            </section>

            <section id="viewer" class="view">
                <div id="thumb-bar" style="height: 80px; display: flex; gap: 16px; padding: 12px; overflow-x: auto; background: var(--header);"></div>
                <div class="stage">
                    <img id="char-portrait" class="char-portrait" src="" style="opacity: 0;">
                </div>
                <div class="bottom-sheet">
                    <h2 id="char-name" style="margin: 0; font-size: 1.8rem;">Archive Entry</h2>
                    <p id="char-desc" style="margin: 12px 0 0 0; line-height: 1.6; opacity: 0.8;">Seeking data...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        /**
         * PHASE 9: SCALABILITY - CENTRALIZED DATABASE
         */
        const DB = {
            races: [
                { id: 'human', label: 'HUMAN', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/human-girl.png' },
                { id: 'elf', label: 'ELF', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/elf-girl-box-image.jpg' },
                { id: 'beastmen', label: 'BEASTMEN', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/beastmen.jpg' },
                { id: 'vampire', label: 'VAMPIRE', img: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/backgrounds/vampire-girl-box.jpg' }
            ],
            characters: [
                {
                    id: 'atelier',
                    race: 'human',
                    name: 'Atelier',
                    desc: 'A gentle-hearted human girl from the Ghoom hills. Expert in botanical alchemy.',
                    portrait: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/atelier-human-girl/atelier-human-girl-main.png',
                    icon: 'https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/atelier-human-girl/atelier-human-girl-icon.png'
                }
            ]
        };

        /**
         * PHASE 4: NAVIGATION & STATE MANAGEMENT
         */
        const Router = {
            nav(viewId) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                const target = document.getElementById(viewId);
                if(target) target.classList.add('active');
                
                // Update Header Title
                const titles = { 'welcome': 'HOME', 'race-select': 'DATABASE', 'viewer': 'ARCHIVE' };
                document.getElementById('header-title').innerText = titles[viewId] || 'MISTY ARCHIVE';
            }
        };

        /**
         * PHASE 5: PERFORMANCE - CANVAS PARTICLE ENGINE
         */
        const Particles = {
            canvas: document.getElementById('particle-canvas'),
            ctx: null,
            items: [],
            init() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                for(let i=0; i<60; i++) this.items.push(this.create('rain'));
                for(let i=0; i<20; i++) this.items.push(this.create('petal'));
                this.animate();
            },
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            create(type) {
                return {
                    type,
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    speed: type === 'rain' ? 10 + Math.random() * 10 : 2 + Math.random() * 3,
                    size: type === 'rain' ? 2 : 5 + Math.random() * 5,
                    opacity: 0.2 + Math.random() * 0.5
                };
            },
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.items.forEach(p => {
                    p.y += p.speed;
                    if(p.type === 'petal') p.x += Math.sin(p.y / 20);
                    if(p.y > this.canvas.height) { p.y = -20; p.x = Math.random() * this.canvas.width; }
                    
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fillStyle = p.type === 'rain' ? '#fff' : '#f8bbd0';
                    if(p.type === 'rain') this.ctx.fillRect(p.x, p.y, 1, 15);
                    else {
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                });
                requestAnimationFrame(() => this.animate());
            }
        };

        /**
         * PHASE 8: CONTENT & UX FLOW
         */
        function initApp() {
            const grid = document.getElementById('race-grid');
            DB.races.forEach(race => {
                const card = document.createElement('div');
                card.className = 'race-card';
                card.innerHTML = `<img src="${race.img}" loading="lazy"><div class="race-label">${race.label}</div>`;
                card.onclick = () => loadRace(race.id);
                grid.appendChild(card);
            });

            Particles.init();
            
            // Handle Loader
            window.addEventListener('load', () => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            });
        }

        function loadRace(raceId) {
            const bar = document.getElementById('thumb-bar');
            bar.innerHTML = "";
            const chars = DB.characters.filter(c => c.race === raceId);
            
            if(chars.length === 0) {
                alert("Data for this race is currently classified.");
                return;
            }

            chars.forEach(c => {
                const img = document.createElement('img');
                img.src = c.icon;
                img.style = "height: 100%; border-radius: 50%; border: 2px solid var(--blush); cursor: pointer;";
                img.onclick = () => renderCharacter(c);
                bar.appendChild(img);
            });
            Router.nav('viewer');
        }

        function renderCharacter(char) {
            const portrait = document.getElementById('char-portrait');
            portrait.style.opacity = '0';
            setTimeout(() => {
                portrait.src = char.portrait;
                portrait.onload = () => portrait.style.opacity = '1';
                document.getElementById('char-name').innerText = char.name;
                document.getElementById('char-desc').innerText = char.desc;
            }, 200);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            const overlay = document.getElementById('sidebar-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        initApp();
    </script>
</body>
</html>
