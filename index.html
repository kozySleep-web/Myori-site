<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misty Archive | Final</title>
    <style>
        :root {
            --blush: #f8bbd0;
            --cream: #fffdf0;
            --text-soft: #5d4037;
            --glass-soft: rgba(255, 255, 255, 0.4);
            --accent: #e0d5c1;
        }

        body, html { margin: 0; padding: 0; font-family: 'Georgia', serif; background: var(--cream); color: var(--text-soft); height: 100%; overflow: hidden; }
        .view { display: none; width: 100vw; height: 100vh; position: relative; }
        .active { display: flex !important; flex-direction: column; }

        /* LOADER */
        #loader { position: fixed; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        
        /* WELCOME (With your Cherry Blossom BG) */
        #welcome { justify-content: center; align-items: center; }
        .welcome-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://w.wallhaven.cc/full/ox/wallhaven-ox6589.jpg') center/cover; 
            filter: blur(12px) brightness(0.9); transform: scale(1.1); z-index: 0; 
        }
        .glass-panel { background: var(--glass-soft); backdrop-filter: blur(10px); padding: 40px; border: 1px solid white; text-align: center; z-index: 5; }

        /* CATEGORIES */
        .screen-bg { background: var(--cream); justify-content: center; align-items: center; }
        .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .bento-item { background: white; border: 1px solid var(--accent); height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        .bento-item:hover { background: var(--blush); color: white; }

        /* VIEWER (Atelier Section) */
        .top-nav { display: flex; overflow-x: auto; padding: 15px; background: white; border-bottom: 2px solid var(--accent); min-height: 80px; }
        .thumb { min-width: 65px; height: 65px; border: 2px solid #eee; margin-right: 12px; cursor: pointer; border-radius: 50%; object-fit: cover; }
        .stage { flex-grow: 1; position: relative; background: #fdf5e6; overflow: hidden; }
        .main-char { position: absolute; left: -10%; bottom: 0; height: 95%; filter: drop-shadow(10px 0 20px rgba(0,0,0,0.1)); transition: 0.5s; }
        .profile-card { position: absolute; right: 5%; bottom: 5%; width: 280px; background: white; padding: 25px; border-top: 10px solid var(--blush); box-shadow: 15px 15px 0px rgba(93, 64, 55, 0.05); }
        .exp-icons { display: flex; gap: 10px; margin-top: 15px; }
        .exp-img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/ui/shigure-ui-transparent.gif" style="width:180px;">
        <div style="margin-top:10px; letter-spacing:3px; font-size:12px;">LOADING ARCHIVE...</div>
    </div>

    <div id="main-content" style="visibility: hidden;">
        
        <div id="welcome" class="view active">
            <div class="welcome-bg"></div>
            <div class="glass-panel">
                <h1 style="margin:0; color:white; letter-spacing:5px;">MISTY ARCHIVE</h1>
                <button onclick="nav('race-select')" style="margin-top:20px; padding:10px 30px; cursor:pointer; background:white; border:none; font-weight:bold;">ENTER</button>
            </div>
        </div>

        <div id="race-select" class="view screen-bg">
            <h2 style="letter-spacing:5px;">SELECT RACE</h2>
            <div class="bento-grid">
                <div class="bento-item" onclick="selectRace('human')">HUMAN</div>
                <div class="bento-item" onclick="selectRace('elf')">ELF</div>
                <div class="bento-item" onclick="selectRace('beastmen')">BEASTMEN</div>
                <div class="bento-item" onclick="selectRace('demon')">DEMON</div>
            </div>
        </div>

        <div id="gender-select" class="view screen-bg">
            <h2 id="gender-title" style="letter-spacing:5px;">SELECT GENDER</h2>
            <div class="bento-grid">
                <div class="bento-item" onclick="selectGender('male')">MALE</div>
                <div class="bento-item" onclick="selectGender('female')">FEMALE</div>
            </div>
        </div>

        <div id="viewer" class="view">
            <div class="top-nav" id="thumbnail-list"></div>
            <div class="stage">
                <img id="char-img" src="" class="main-char">
                <div class="profile-card">
                    <h2 id="char-name">Select Character</h2>
                    <p id="char-cv" style="font-size:12px; color:var(--blush); margin:5px 0;"></p>
                    <p id="char-desc" style="font-size:14px; line-height:1.5;"></p>
                    <div class="exp-icons" id="expressions" style="display:none;">
                        <img id="exp1" src="" class="exp-img">
                        <img id="exp2" src="" class="exp-img">
                    </div>
                    <button onclick="nav('gender-select')" style="border:none; background:none; color:var(--blush); font-weight:bold; cursor:pointer; margin-top:15px;">[ BACK ]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRace = "";
        let selectedGender = "";

        const chars = [
            {
                id: 'Atelier',
                race: 'human',
                gender: 'female',
                name: 'Atelier',
                cv: 'Marika Tachibana',
                desc: 'A young girl rescued from slavery. She is the quiet but kind-hearted poster girl of Dennis’s diner.',
                main: 'https://tsuihosha-shokudo.com/assets/img/chara/img_chara_stand02.png',
                icon: 'https://tsuihosha-shokudo.com/assets/img/chara/img_chara_up02-1.png',
                exp1: 'https://tsuihosha-shokudo.com/assets/img/chara/img_chara_up02-2.png',
                exp2: 'https://tsuihosha-shokudo.com/assets/img/logo_s_en.png'
            }
        ];

        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectRace(race) {
            selectedRace = race;
            nav('gender-select');
        }

        function selectGender(gender) {
            selectedGender = gender;
            renderIcons();
            nav('viewer');
        }

        function renderIcons() {
            const list = document.getElementById('thumbnail-list');
            list.innerHTML = "";
            const filtered = chars.filter(c => c.race === selectedRace && c.gender === selectedGender);
            filtered.forEach(c => {
                const img = document.createElement('img');
                img.src = c.icon;
                img.className = 'thumb';
                img.onclick = () => setChar(c);
                list.appendChild(img);
            });
        }

        function setChar(c) {
            document.getElementById('char-name').innerText = c.name;
            document.getElementById('char-cv').innerText = "CV. " + c.cv;
            document.getElementById('char-desc').innerText = c.desc;
            document.getElementById('char-img').src = c.main;
            document.getElementById('char-img').style.opacity = '1';
            document.getElementById('expressions').style.display = 'flex';
            document.getElementById('exp1').src = c.exp1;
            document.getElementById('exp2').src = c.exp2;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                document.getElementById('main-content').style.visibility = 'visible';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 600);
            }, 2000);
        });
    </script>
</body>
</html>
