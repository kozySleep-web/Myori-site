<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misty Archive | Official</title>
    <style>
        :root {
            --blush: #f8bbd0;
            --cream: #fffdf0;
            --text-soft: #5d4037;
            --glass-soft: rgba(255, 255, 255, 0.45);
            --accent: #e0d5c1;
        }

        /* BASE STYLES */
        body, html { margin: 0; padding: 0; font-family: 'Georgia', serif; background: var(--cream); color: var(--text-soft); height: 100%; overflow: hidden; }
        .view { display: none; width: 100vw; height: 100vh; position: relative; overflow-y: auto; box-sizing: border-box; }
        .active { display: flex !important; flex-direction: column; }

        /* LOADER SECTION */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: opacity 0.6s ease; 
        }
        .loader-gif { width: 45vw; max-width: 280px; height: auto; }

        /* WELCOME SCREEN */
        #welcome { justify-content: center; align-items: center; }
        .welcome-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            /* 🟢 PASTE CHERRY BLOSSOM LINK BELOW */
            background: url('https://w.wallhaven.cc/full/ox/wallhaven-ox6589.jpg') center/cover; 
            filter: blur(8px) brightness(0.8); transform: scale(1.1); z-index: 0; 
        }
        .welcome-panel {
            position: relative; z-index: 5; width: 85%; max-width: 450px; padding: 40px;
            /* 🟢 PASTE WELCOME BOX IMAGE LINK BELOW */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('PASTE_BOX_IMAGE_LINK') center/cover;
            border: 2px solid white; backdrop-filter: blur(12px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .welcome-panel h1 { color: white; letter-spacing: 5px; font-size: 1.8rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* CATEGORY SELECTION (Bento Grid) */
        .screen-bg { background: var(--cream); padding: 20px; align-items: center; justify-content: center; }
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; width: 100%; max-width: 800px; margin-top: 20px;
        }
        .bento-item { 
            position: relative; height: 170px; overflow: hidden; border: 1px solid var(--accent); 
            cursor: pointer; transition: 0.3s ease; display: flex; align-items: flex-end; justify-content: center;
            background-color: #f0f0f0;
        }
        
        /* 🟢 PASTE CATEGORY RAW LINKS IN THESE CLASSES */
        .bento-item.human { background: url('PASTE_HUMAN_LINK') center/cover; }
        .bento-item.elf { background: url('PASTE_ELF_LINK') center/cover; }
        .bento-item.beastmen { background: url('PASTE_BEASTMEN_LINK') center/cover; }
        .bento-item.vampire { background: url('PASTE_VAMPIRE_LINK') center/cover; }

        .bento-item b { 
            width: 100%; background: rgba(255,255,255,0.9); padding: 10px 0; 
            text-align: center; font-size: 0.8rem; letter-spacing: 2px; color: var(--text-soft); 
        }
        .bento-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* VIEWER AREA */
        .top-nav { display: flex; overflow-x: auto; padding: 15px; background: white; border-bottom: 2px solid var(--accent); min-height: 80px; }
        .thumb { min-width: 65px; height: 65px; border: 2px solid #eee; margin-right: 12px; border-radius: 50%; object-fit: cover; }
        .stage { flex-grow: 1; position: relative; background: #fdf5e6; overflow: hidden; }
        .main-char { position: absolute; left: 50%; transform: translateX(-50%); bottom: 0; height: 95%; transition: 0.5s ease; pointer-events: none; }
        
        @media (min-width: 768px) { .main-char { left: 10%; transform: none; } }

        .profile-card { 
            position: absolute; right: 5%; bottom: 5%; width: 90%; max-width: 320px; 
            background: white; padding: 25px; border-top: 8px solid var(--blush); 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05); box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://raw.githubusercontent.com/kozySleep-web/Myori-site/refs/heads/main/assets/ui/shigure-ui-transparent.gif" class="loader-gif">
        <div style="margin-top:15px; letter-spacing:4px; font-size:10px; color:#999;">LOADING MISTY ARCHIVE...</div>
    </div>

    <div id="main-content" style="visibility: hidden;">
        
        <div id="welcome" class="view active">
            <div class="welcome-bg"></div>
            <div class="welcome-panel">
                <h1>MISTY ARCHIVE</h1>
                <button onclick="nav('race-select')" style="margin-top:25px; padding:12px 40px; cursor:pointer; background:white; border:none; font-weight:bold; letter-spacing:2px; font-size:11px;">ENTER</button>
            </div>
        </div>

        <div id="race-select" class="view screen-bg">
            <h2 style="letter-spacing:5px;">SELECT RACE</h2>
            <div class="bento-grid">
                <div class="bento-item human" onclick="selectRace('human')"><b>HUMAN</b></div>
                <div class="bento-item elf" onclick="selectRace('elf')"><b>ELF</b></div>
                <div class="bento-item beastmen" onclick="selectRace('beastmen')"><b>BEASTMEN</b></div>
                <div class="bento-item vampire" onclick="selectRace('vampire')"><b>VAMPIRE</b></div>
            </div>
        </div>

        <div id="gender-select" class="view screen-bg">
            <h2 style="letter-spacing:5px;">SELECT GENDER</h2>
            <div class="bento-grid">
                <div class="bento-item" style="background:#fff;" onclick="selectGender('male')"><b>MALE</b></div>
                <div class="bento-item" style="background:#fff;" onclick="selectGender('female')"><b>FEMALE</b></div>
            </div>
            <button onclick="window.history.back()" style="margin-top:40px; background:none; border:none; color:#bbb; font-weight:bold; cursor:pointer;">[ GO BACK ]</button>
        </div>

        <div id="viewer" class="view">
            <div class="top-nav" id="thumbnail-list"></div>
            <div class="stage">
                <img id="char-img" src="" class="main-char">
                <div class="profile-card">
                    <h2 id="char-name" style="margin:0;">-</h2>
                    <p id="char-cv" style="font-size:11px; color:var(--blush); margin:5px 0;"></p>
                    <p id="char-desc" style="font-size:13px; line-height:1.6; margin-bottom:15px;"></p>
                    <button onclick="window.history.back()" style="border:none; background:none; color:var(--blush); font-weight:bold; cursor:pointer; padding:0;">[ BACK ]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRace = "";
        let selectedGender = "";

        // NAVIGATION ENGINE (Fixes the phone back button)
        function nav(id, addHistory = true) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if (addHistory) history.pushState({ screenId: id }, "", "");
        }

        window.onpopstate = function(event) {
            if (event.state && event.state.screenId) nav(event.state.screenId, false);
            else nav('welcome', false);
        };

        function selectRace(race) { selectedRace = race; nav('gender-select'); }
        function selectGender(gender) { selectedGender = gender; renderIcons(); nav('viewer'); }

        // CHARACTER DATABASE
        const chars = [
            {
                id: 'Atelier',
                race: 'human',
                gender: 'female',
                name: 'Atelier',
                cv: 'Marika Tachibana',
                desc: 'A gentle-hearted girl from the local hills. She enjoys the misty mornings and works at the village diner.',
                main: 'https://tsuihosha-shokudo.com/assets/img/chara/atelier/img_chara_stand02.png',
                icon: 'https://i.postimg.cc/C1z8g7z4/Atelier-Icon1.png'
            }
        ];

        function renderIcons() {
            const list = document.getElementById('thumbnail-list');
            list.innerHTML = "";
            const filtered = chars.filter(c => c.race === selectedRace && c.gender === selectedGender);
            filtered.forEach(c => {
                const img = document.createElement('img');
                img.src = c.icon;
                img.className = 'thumb';
                img.onclick = () => setChar(c);
                list.appendChild(img);
            });
        }

        function setChar(c) {
            document.getElementById('char-name').innerText = c.name;
            document.getElementById('char-cv').innerText = "CV. " + c.cv;
            document.getElementById('char-desc').innerText = c.desc;
            document.getElementById('char-img').src = c.main;
            document.getElementById('char-img').style.opacity = '1';
        }

        // INITIAL LOAD
        window.addEventListener('load', () => {
            history.replaceState({ screenId: 'welcome' }, "", "");
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                document.getElementById('main-content').style.visibility = 'visible';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 600);
            }, 2600);
        });
    </script>
</body>
                                                                                                               </html>
